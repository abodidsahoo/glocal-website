<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glocal Films UK | Cinematic Excellence</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Glocal Films UK - Cinematic storytellers bringing global quality to local stories. Founded by Partha Panda & Jitendra Mishra.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="ambient-glow"></div>
    
    <!-- Floating Movie Icons -->
    <svg class="floating-icon icon-1" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 8-5-3"/><path d="m17 11-5-3"/><path d="m12 14-5-3"/><path d="m7 17-5-3"/><path d="M2 8h20"/></svg>
    <svg class="floating-icon icon-2" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
    <svg class="floating-icon icon-3" width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="m16.24 7.76-8.48 8.48"/><path d="m16.24 16.24-8.48-8.48"/></svg>
    <svg class="floating-icon icon-4" width="55" height="55" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.55a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1H18a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1Z"/><path d="M12 10h-1.55a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1H12a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1Z"/><path d="M6 10H4.45a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1H6a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1Z"/><path d="M3 13h18c.5 0 1 .5 1 1v5c0 1-1 2-2 2H4c-1 0-2-1-2-2v-5c0-.5.5-1 1-1Z"/><path d="M12 13v8"/></svg>

    <!-- Main Content Container -->
    <main class="container">
        <header>
            <h1>Glocal Films UK</h1>
            <p class="tagline">Going Live Soon</p>
        </header>

        <!-- Countdown Component -->
        <section class="timer-container">
            <div class="timer-box">
                <span class="timer-value" id="days">00</span>
                <span class="timer-label">Days</span>
            </div>
            <div class="timer-box">
                <span class="timer-value" id="hours">00</span>
                <span class="timer-label">Hours</span>
            </div>
            <div class="timer-box">
                <span class="timer-value" id="minutes">00</span>
                <span class="timer-label">Mins</span>
            </div>
            <div class="timer-box">
                <span class="timer-value" id="seconds">00</span>
                <span class="timer-label">Secs</span>
            </div>
        </section>

        <!-- Dynamic Content Area -->
        <section class="section-divider">
            <h2 class="founders-title">Founders</h2>
            <p class="founders-names">Partha Panda & Jitendra Mishra</p>
        </section>
    </main>

    <!-- Global Footer -->
    <footer class="footer">
        <p>&copy; 2026 GLOCAL FILMS UK</p>
        <address class="address">Head Office: 195 Broadway, Bexleyheath, London, DA6 7ER</address>
    </footer>

    <!-- Scripts -->
    <script>
        const countdownDate = new Date().getTime() + (3 * 24 * 60 * 60 * 1000);

        function updateTimer() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(timerInterval);
                document.querySelector(".container").innerHTML = "<h1>We Are Live</h1>";
            }
        }

        const timerInterval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
